services:
  postgres:
    image: postgres:16-alpine
    container_name: smart-travel-planner-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: smart_travel_planner
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d smart_travel_planner"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
